<!DOCTYPE html>
<html>
<head>
    <title>ConvertIT - Video to Audio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: #fff;
            padding: 20px;
            margin: 50px auto;
            width: 500px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            text-align: left;
        }

        h2 {
            font-size: 20px;
            margin-bottom: 20px;
            color: #333;
            text-align: center;
        }

        label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
            color: #555;
        }

        input[type="file"], select, button {
            width: 100%;
            padding: 8px;
            margin-top: 4px;
            margin-bottom: 10px;
            box-sizing: border-box;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        button {
            cursor: pointer;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 10px;
            font-size: 14px;
            font-weight: bold;
            transition: background-color 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background-color: #0056b3;
        }
        
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .preview {
            margin-top: 10px;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .preview video {
            width: 100%;
            max-height: 200px;
        }
        
        .loading-bar {
            width: 100%;
            height: 4px;
            background-color: #f0f0f0;
            border-radius: 2px;
            margin-top: 10px;
            display: none;
            overflow: hidden;
        }
        
        .loading-progress {
            width: 0%;
            height: 100%;
            background-color: #007BFF;
            border-radius: 2px;
            animation: loading 2s infinite;
        }
        
        @keyframes loading {
            0% { width: 0%; }
            50% { width: 70%; }
            100% { width: 100%; }
        }
        
        .loading-text {
            font-size: 12px;
            color: #666;
            text-align: center;
            margin-top: 5px;
            display: none;
        }
        
        .back-link {
            display: inline-block;
            margin-top: 20px;
            text-align: center;
            width: 100%;
            color: #007BFF;
            text-decoration: none;
        }
        
        .back-link:hover {
            text-decoration: underline;
        }
        
        .next-file-btn {
            background-color: #28a745;
            margin-top: 10px;
        }
        
        .next-file-btn:hover {
            background-color: #218838;
        }
        
        .queue-info {
            background-color: #e9ecef;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 12px;
            text-align: center;
        }
        
        @media (max-width: 768px) {
            .container {
                width: 90%;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Video to Audio Converter</h2>
    
    <div class="queue-info" id="queueInfo" style="display:none;">
        <strong>Files in queue:</strong> <span id="queueCount">0</span>
    </div>
    
    <form action="/convert" method="POST" enctype="multipart/form-data" id="videoForm">
        <input type="hidden" name="type" value="video_to_audio">
        <input type="hidden" name="session_id" id="sessionId" value="">

        <label>Video File:</label>
        <input type="file" name="file" accept="video/*" required id="videoFile">
        <div class="preview" id="videoPreview"></div>

        <label>Output Format:</label>
        <select name="format" id="formatSelect">
            <option value="mp3">MP3</option>
            <option value="aac">AAC</option>
            <option value="wav">WAV</option>
        </select>

        <button type="submit" id="convertBtn">Convert</button>
        <button type="button" id="nextFileBtn" class="next-file-btn" style="display:none;">+ Add Next File</button>
        <div class="loading-bar" id="loadingBar">
            <div class="loading-progress"></div>
        </div>
        <div class="loading-text" id="loadingText">Converting, please wait...</div>
    </form>
    <a href="/" class="back-link">Back to Home</a>
</div>

<script>
    let sessionId = localStorage.getItem('video_session_id') || '';
    let fileQueue = JSON.parse(localStorage.getItem('video_queue') || '[]');
    
    // Set session ID
    if (!sessionId) {
        sessionId = generateUUID();
        localStorage.setItem('video_session_id', sessionId);
    }
    document.getElementById('sessionId').value = sessionId;
    
    // Update queue display
    function updateQueueDisplay() {
        const queueInfo = document.getElementById('queueInfo');
        const queueCount = document.getElementById('queueCount');
        const nextFileBtn = document.getElementById('nextFileBtn');
        
        if (fileQueue.length > 0) {
            queueInfo.style.display = 'block';
            queueCount.textContent = fileQueue.length;
            nextFileBtn.style.display = 'block';
        } else {
            queueInfo.style.display = 'none';
            nextFileBtn.style.display = 'none';
        }
    }
    
    // Generate UUID
    function generateUUID() {
        return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
            var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
            return v.toString(16);
        });
    }
    
    // Video Preview
    const videoFile = document.getElementById('videoFile');
    if (videoFile) {
        videoFile.addEventListener('change', function(e) {
            const file = this.files[0];
            const previewDiv = document.getElementById('videoPreview');
            if (!file) {
                previewDiv.innerHTML = '';
                return;
            }
            
            previewDiv.innerHTML = '';
            
            if (file.type.startsWith('video/')) {
                const video = document.createElement('video');
                video.controls = true;
                video.src = URL.createObjectURL(file);
                previewDiv.appendChild(video);
            }
        });
    }
    
    // Add to queue and reset form
    function addToQueueAndReset() {
        const videoInput = document.getElementById('videoFile');
        const formatSelect = document.getElementById('formatSelect');
        
        if (videoInput.files.length > 0) {
            const queueItem = {
                video: videoInput.files[0].name,
                videoData: videoInput.files[0],
                format: formatSelect.value
            };
            
            fileQueue.push(queueItem);
            localStorage.setItem('video_queue', JSON.stringify(fileQueue));
            
            // Reset form
            videoInput.value = '';
            document.getElementById('videoPreview').innerHTML = '';
            
            updateQueueDisplay();
        } else {
            alert('Please select a video file first');
        }
    }
    
    // Process next file
    async function processNextFile() {
        if (fileQueue.length === 0) return;
        
        const nextItem = fileQueue[0];
        const formData = new FormData();
        
        formData.append('type', 'video_to_audio');
        formData.append('session_id', sessionId);
        formData.append('format', nextItem.format);
        
        // Create file objects from stored data
        const videoBlob = nextItem.videoData;
        const videoFileObj = new File([videoBlob], nextItem.video, {type: videoBlob.type});
        formData.append('file', videoFileObj);
        
        // Show loading
        const loadingBar = document.getElementById('loadingBar');
        const loadingText = document.getElementById('loadingText');
        const convertBtn = document.getElementById('convertBtn');
        const nextFileBtn = document.getElementById('nextFileBtn');
        
        loadingBar.style.display = 'block';
        loadingText.style.display = 'block';
        if (convertBtn) convertBtn.disabled = true;
        if (nextFileBtn) nextFileBtn.disabled = true;
        
        try {
            const response = await fetch('/convert', {
                method: 'POST',
                body: formData
            });
            
            const result = await response.text();
            
            // Remove processed file from queue
            fileQueue.shift();
            localStorage.setItem('video_queue', JSON.stringify(fileQueue));
            updateQueueDisplay();
            
            // Process next file if any
            if (fileQueue.length > 0) {
                await processNextFile();
            } else {
                // All files processed
                loadingBar.style.display = 'none';
                loadingText.style.display = 'none';
                if (convertBtn) convertBtn.disabled = false;
                if (nextFileBtn) nextFileBtn.disabled = false;
                alert('All files converted successfully!');
                // Show result in new window
                const newWindow = window.open();
                newWindow.document.write(result);
            }
        } catch (error) {
            console.error('Error:', error);
            loadingBar.style.display = 'none';
            loadingText.style.display = 'none';
            if (convertBtn) convertBtn.disabled = false;
            if (nextFileBtn) nextFileBtn.disabled = false;
            alert('Error processing file');
        }
    }
    
    // Handle form submit
    const videoForm = document.getElementById('videoForm');
    if (videoForm) {
        videoForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const videoInput = document.getElementById('videoFile');
            if (!videoInput.files.length) {
                alert('Please select a video file');
                return;
            }
            
            // If there are files in queue, add current to queue
            if (fileQueue.length > 0) {
                addToQueueAndReset();
                return;
            }
            
            // Process current file
            const formData = new FormData(videoForm);
            formData.append('session_id', sessionId);
            
            const loadingBar = document.getElementById('loadingBar');
            const loadingText = document.getElementById('loadingText');
            const convertBtn = document.getElementById('convertBtn');
            const nextFileBtn = document.getElementById('nextFileBtn');
            
            loadingBar.style.display = 'block';
            loadingText.style.display = 'block';
            if (convertBtn) convertBtn.disabled = true;
            if (nextFileBtn) nextFileBtn.disabled = true;
            
            try {
                const response = await fetch('/convert', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.text();
                
                // Check if there are queued files
                if (fileQueue.length > 0) {
                    await processNextFile();
                } else {
                    loadingBar.style.display = 'none';
                    loadingText.style.display = 'none';
                    if (convertBtn) convertBtn.disabled = false;
                    if (nextFileBtn) nextFileBtn.disabled = false;
                    
                    // Show result in new window
                    const newWindow = window.open();
                    newWindow.document.write(result);
                }
            } catch (error) {
                console.error('Error:', error);
                loadingBar.style.display = 'none';
                loadingText.style.display = 'none';
                if (convertBtn) convertBtn.disabled = false;
                if (nextFileBtn) nextFileBtn.disabled = false;
                alert('Error processing file');
            }
        });
    }
    
    // Next file button
    const nextFileBtn = document.getElementById('nextFileBtn');
    if (nextFileBtn) {
        nextFileBtn.addEventListener('click', addToQueueAndReset);
    }
    
    // Initialize display
    updateQueueDisplay();
</script>

</body>
</html>
