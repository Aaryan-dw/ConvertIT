<!DOCTYPE html>
<html>
<head>
    <title>ConvertIT - Conversion Complete</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: #fff;
            padding: 30px;
            margin: 50px auto;
            width: 500px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            color: #28a745;
            margin-bottom: 20px;
        }

        .success-icon {
            font-size: 50px;
            color: #28a745;
            margin-bottom: 20px;
        }

        .file-info {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            margin: 10px;
            background-color: #007BFF;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        .btn:hover {
            background-color: #0056b3;
        }

        .btn-success {
            background-color: #28a745;
        }

        .btn-success:hover {
            background-color: #218838;
        }

        .btn-warning {
            background-color: #ffc107;
            color: #333;
        }

        .btn-warning:hover {
            background-color: #e0a800;
        }

        .button-group {
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .container {
                width: 90%;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="success-icon">✓</div>
    <h2>Conversion Complete!</h2>
    
    <div class="file-info">
        <strong>File converted successfully:</strong><br>
        {{ filename }}
    </div>
    
    <div class="button-group">
        <a href="/download/{{ session_id }}/{{ filename }}" class="btn">Download File</a>
        <a href="/download_all/{{ session_id }}" class="btn btn-success">Download All Files</a>
        <a href="/{{ conversion_type.split('_')[0] }}" class="btn btn-warning">Convert More Files</a>
        <a href="/clear_session/{{ session_id }}" class="btn">Clear Session</a>
    </div>
</div>

</body>
</html>
